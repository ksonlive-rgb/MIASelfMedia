<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>亲子教育画像测试题</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #f3f5f9 0%, #e9edf5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card{
      max-width: 720px; width: 100%;
      background: #ffffff; border-radius: 36px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12);
      padding: 32px 28px 36px; transition: all 0.2s;
    }
    h1{ font-size: 28px; font-weight: 700; color: #162b4e; text-align: center; margin-bottom: 6px; }
    .sub{ text-align: center; color: #5f6c84; font-size: 15px; border-bottom: 1px solid #e9edf4; padding-bottom: 22px; margin-bottom: 12px; }
    .step-indicator{ display: flex; justify-content: center; gap: 8px; margin: 16px 0 8px; font-size: 14px; color: #55657e; }
    .progress-bar{ height: 6px; background: #e5e9f2; border-radius: 20px; margin: 10px 0 20px; overflow: hidden; }
    .progress-fill{ height: 100%; background: #2d4b8e; width: 0%; border-radius: 20px; transition: width 0.3s; }
    .question-panel{ background: #f9fafc; border-radius: 22px; padding: 26px 22px; margin-bottom: 18px; border: 1px solid #eef1f7; }
    .q-text{ font-size: 17px; font-weight: 600; color: #1a253b; margin-bottom: 22px; line-height: 1.5; }
    .options-grid{ display: flex; flex-direction: column; gap: 14px; }
    .option-item{
      background: #fff; border: 1.5px solid #dfe3ed; border-radius: 18px; padding: 14px 18px;
      cursor: pointer; transition: 0.15s; font-size: 15px; color: #2e3a52; display: flex; align-items: center; gap: 14px;
    }
    .option-item:hover{ border-color: #3c5a9a; background: #f6f9ff; }
    .option-item.selected{ border-color: #2d4b8e; background: #eef3ff; box-shadow: 0 0 0 3px rgba(45,75,142,0.2); }
    .radio-custom{ width: 20px; height: 20px; border-radius: 50%; border: 2px solid #b9c2d6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .selected .radio-custom{ border-color: #2d4b8e; background: #2d4b8e; box-shadow: inset 0 0 0 4px #fff; }
    .nav-buttons{ display: flex; justify-content: space-between; margin-top: 8px; gap: 12px; }
    .btn{ padding: 14px 32px; border-radius: 40px; font-weight: 600; font-size: 16px; border: none; cursor: pointer; background: white; color: #2d4b8e; border: 1px solid #cdd6e9; transition: 0.15s; }
    .btn:active{ transform: scale(0.97); }
    .btn-primary{ background: #1f3a6e; color: white; border: none; box-shadow: 0 8px 18px rgba(25,55,110,0.25); }
    .btn-primary:hover{ background: #17305c; }
    .btn:disabled{ opacity: 0.5; pointer-events: none; }
    .result-container{ background: #f8fafd; border-radius: 28px; padding: 24px 20px; margin-top: 16px; display: none; }
    .type-badge{ font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .type-sub{ font-size: 16px; color: #5f6c84; text-align: center; margin-bottom: 16px; }
    .type-desc{ font-size: 15px; color: #3e4b62; margin: 16px 0; text-align: center; line-height: 1.6; }
    .advice-box{ background: #fff7ed; border-left: 5px solid #f97316; padding: 18px; border-radius: 16px; margin: 20px 0; font-size: 15px; }
    .pay-teaser{ background: linear-gradient(105deg, #eef3ff, #f2f5fc); border: 2px dashed #4467b0; border-radius: 22px; padding: 24px; text-align: center; margin-top: 20px; }
    .guide-modal{ position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index:1000; }
    .guide-content{ background: white; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 28px; padding: 32px 24px; position: relative; }
    .close-guide{ position: absolute; top:16px; right:20px; background: none; border: none; font-size: 28px; cursor: pointer; color: #5f6c84; }
    .guide-section{ margin: 20px 0; }
    .guide-section h3{ color: #1e3a8a; margin-bottom: 10px; font-size: 18px; }
    .guide-section ul{ padding-left: 20px; line-height: 1.8; }
    .guide-section li{ margin-bottom: 6px; }
    .radar-container{ display: flex; justify-content: center; margin: 16px 0; }
    canvas{ max-width: 100%; }
    .time-table{ width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    .time-table th{ background: #eef3ff; padding: 10px 6px; text-align: left; }
    .time-table td{ padding: 10px 6px; border-bottom: 1px solid #e9edf4; vertical-align: top; }
    .hidden{ display: none !important; }
    @media (max-width: 500px) { .card{ padding: 20px 16px; } .q-text{ font-size: 15px; } }
  </style>
</head>
<body>
<div class="card" id="app">
  <h1>🧑‍👧 亲子教育画像测试题</h1>
  <div class="sub">理性看见孩子 · 也看见自己</div>

  <div id="ageScreen">
    <div style="text-align:center; font-weight:600; margin:20px 0 12px; font-size:18px;">请选择孩子年龄阶段</div>
    <div class="options-grid" style="max-width:300px; margin:0 auto;">
      <div class="option-item" data-age="3-5" onclick="selectAge('3-5')">🍼 3－5岁（学龄前）</div>
      <div class="option-item" data-age="6-8" onclick="selectAge('6-8')">📘 6－8岁（低年级）</div>
      <div class="option-item" data-age="9-12" onclick="selectAge('9-12')">📗 9－12岁（中高年级）</div>
      <div class="option-item" data-age="13-18" onclick="selectAge('13-18')">📙 13－18岁（青少年）</div>
    </div>
  </div>

  <div id="quizScreen" class="hidden">
    <div class="step-indicator" id="stepText">第 1 / 30 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-panel">
      <div class="q-text" id="questionText"></div>
      <div class="options-grid" id="optionsContainer"></div>
    </div>
    <div class="nav-buttons">
      <button class="btn" id="prevBtn" disabled>← 上一题</button>
      <button class="btn btn-primary" id="nextBtn">下一题 →</button>
    </div>
  </div>

  <div id="resultScreen" class="result-container">
    <div id="resultContent"></div>
  </div>
</div>

<script>
  // ====================== 完整题库 (80题) ======================
  const questionBank = {
    '3-5': [

      { id:102, dim:'focus', text:'陪孩子搭积木，他搭两下就跑去玩别的，你心里怎么想？', opts:[
        {t:'这孩子一点专注力都没有', s:3},{t:'这个年龄这样很正常', s:0},{t:'我会想办法吸引他回来', s:1},{t:'有点失望，但不再强求', s:2}

      { id:110, dim:'parenting', text:'你是否曾脱口而出“你再这样妈妈不要你了”这样的话？', opts:[

      { id:111, dim:'focus', text:'绘本读到一半孩子就跑开，你的感受是？', opts:[

      { id:113, dim:'development', text:'教孩子穿鞋，他左右不分，你的态度是？', opts:[

      { id:119, dim:'development', text:'如厕训练时孩子抗拒坐马桶，你倾向于？', opts:[

      ]}
    ],
    '6-8': [
      { id:201, dim:'focus', text:'孩子写作业磨蹭，你坐在旁边一般会？', opts:[
        {t:'看书或安静做自己的事', s:0},{t:'不时提醒“快写”', s:2},{t:'忍不住批评或敲桌子', s:3},{t:'刷手机等他，偶尔看看进度', s:1}

      { id:202, dim:'emotion', text:'孩子因为字写不好急哭，你的感受是？', opts:[

    113: { scene:'孩子穿鞋左右不分', advice:'游戏化纠错。说：“这两只鞋子吵架了，它们想背对背。你帮它们和好，让它们头碰头（向内弯）好吗？”', reason:'用拟人化游戏消解纠错带来的挫败感。' },
    114: { scene:'早教课粘人', advice:'建立“视线确认点”。说：“我就坐在后排那个蓝椅子上。如果你觉得累了或者想抱了，随时回头看，我都在。”', reason:'确认安全基地的存在，是孩子向外探索的心理前提。' },
    115: { scene:'公共场合孩子大哭', advice:'家长先“断网”。带他离开人群说：“这里太吵了，我也心烦。我们去那个安静角落待会儿，等你觉得好点了再说。”', reason:'隔离干扰源，保护孩子自尊的同时降低家长的焦虑。' },
    116: { scene:'老人插手教育', advice:'引入第三方权威避开正面冲突。说：“妈，现在的体检医生建议，这个阶段这样管对孩子发育更好，咱们试试医生的办法？”', reason:'将家庭权力斗争转化为“科学建议”的执行，降低对立感。' },
    117: { scene:'对孩子期望过高', advice:'区分人生课题。自省并告诉孩子：“你是你，我是我。我希望你快乐，不是希望你替我完成我没做成的梦。”', reason:'松开情感勒索，让孩子在被“看见”的基础上生长。' },
    118: { scene:'孩子看动画片专注', advice:'建立“预告制度”。提前10分钟说：“还有一集冒险就结束了，闹钟响了我们就去吃水果，好吗？”', reason:'尊重孩子的沉浸感，给大脑留出切换任务的缓冲期。' },
    119: { scene:'如厕训练抗拒', advice:'消除权力博弈。说：“马桶怪兽今天想和你交朋友，它说它想帮你处理掉臭臭，我们要不要去试试它的威力？”', reason:'将枯燥或恐惧的任务转化为角色扮演游戏。' },
    120: { scene:'孩子帮倒忙摔坏东西', advice:'先处理人，后处理事。说：“比起这个盘子，我更庆幸你没受伤。谢谢你帮我忙，下次我们一起戴上‘任务手套’。”', reason:'维护主动性，让孩子知道他的尝试比物品价值更重要。' },

    201: { scene:'写作业磨蹭', advice:'拆解任务，缩短反馈。说：“这一页看起来像座大山。我们先挑战前5题，5分钟搞定后你拥有10分钟的‘自由跳跃时间’。”', reason:'利用“分段激励”降低任务过重导致的心理防御性拖延。' },
    202: { scene:'字写不好急哭', advice:'捕捉微小优点。说：“我看到你刚才那一笔写得非常有力量。这几个字确实难搞，咱们先给手指‘充个电’再回来。”', reason:'用“局部肯定”瓦解整体挫败感，提升自我效能感。' },
    203: { scene:'夫妻辅导作业分歧', advice:'执行“主理人制度”。私下约定：一人辅导时另一人彻底闭嘴，哪怕教错了也事后交流，绝不当面拆台。', reason:'维护教育统一战线，防止孩子利用分歧逃避责任。' },
    204: { scene:'考85分回去问丢分', advice:'复盘“丢分属性”。说：“这85分挺稳。那15分里，哪些是‘粗心鬼’捣乱，哪些是‘知识盲点’？排掉雷，下次分就是你的。”', reason:'聚焦于可优化的技术点，而非定性的分数判决。' },
    205: { scene:'孩子说同学不跟他玩', advice:'去中心化引导。说：“被拒绝肯定不好受。但他不玩不代表你不可爱，可能他现在只想玩球。班里还有谁是你觉得有趣的？”', reason:'引导孩子理解社交是双向选择，避免陷入受害者心态。' },
    206: { scene:'跳绳不如其他同学', advice:'垂直对比，量化进步。说：“别人跳100个是他们的节奏。我们今天只挑战比昨天多跳3个，多了这3个你就赢了昨天的自己。”', reason:'建立微小胜任感，用自我超越代替横向攀比。' },
    207: { scene:'孩子给乞讨者零花钱', advice:'保护善念，引入理性。说：“你的善良很珍贵。下次我们给钱前，可以先观察一下，看看怎样帮助才是最有效的。”', reason:'在不打击同情心的前提下，播下审视与判断的种子。' },
    208: { scene:'孩子不想上兴趣班', advice:'挖掘阻碍根源。说：“当初选它是因为喜欢，现在讨厌一定有原因。是老师太凶，还是进度太难？跟我说说，我们决定是换个方式还是放弃。”', reason:'尊重真实感受，寻找内驱力消失的真实卡点。' },
    209: { scene:'在孩子面前抱怨伴侣', advice:'立即切断并补救。说：“刚才我被情绪控制了，那是我的不对。你爸（妈）有他的缺点，但这是我们的事，我会去处理。”', reason:'停止拉孩子入战局，归还他作为孩子的单纯身份。' },
    210: { scene:'朗读串行加字', advice:'物理引导，游戏化纠错。用指读练习，说：“咱们玩个‘寻宝’游戏，手指点到哪眼就看哪，看谁能准确抓到每个字。”', reason:'利用视觉焦点补偿认知发育差异，减少指责带来的心理紧张。' },
    211: { scene:'在群里晒孩子成绩', advice:'建立隐私契约。说：“这次进步很大，我很为你骄傲。我能不能发给外婆看看？她也很关心你。”', reason:'确认孩子的“物权”和“名誉权”，建立健康的边界感。' },
    212: { scene:'零食被同学要走', advice:'赋能拒绝的权利。说：“你的东西你做主。你想给是分享，不想给就说‘这是我今天的定量，不能给你’，这完全没问题。”', reason:'强化物权意识，支持孩子学会温和而坚定地保护私产。' },
    213: { scene:'咬指甲', advice:'识别压力源而非针对行为。说：“我发现你最近指甲秃了。是不是学校压力大？来，我们玩捏捏乐，给手指找点别的事干。”', reason:'减少负强化，通过提供替代发泄物来缓解底层焦虑。' },
    214: { scene:'输棋掀棋盘', advice:'接纳攻击性，坚持契约。说：“输了确实想原地爆炸，我也讨厌输。但掀了棋盘这局就作废了，等火消了，我们复盘怎么赢回来。”', reason:'允许情绪流淌，同时维护社交规则的底线。' },
    215: { scene:'缺少无目的闲聊', advice:'开启“非评价性”话题。问：“今天学校有什么离谱的事发生吗？或者有什么让你觉得特别无语的人？”', reason:'用“槽点”代替“考点”，建立深层的情感联结。' },
    216: { scene:'孩子照顾生病的你', advice:'强化滋养感。说：“你给我倒的这杯水让我觉得不是一个人在战斗。这种被你照顾的感觉，真好。”', reason:'具体的感谢能让孩子感受到自己的力量，培养责任感。' },
    217: { scene:'管不住情绪', advice:'示范“暂停键”。说：“我现在快要气炸了，为了不伤害你，我要去房间冷静5分钟，这期间谁也别找我。”', reason:'言传身教如何物理隔离愤怒，而非要求孩子做你都做不到的事。' },
    218: { scene:'写反字母', advice:'触觉补偿练习。在沙盘或背上画字母让他猜，说：“字母宝宝迷路了，我们用身体感受一下它到底该往哪边转。”', reason:'利用多感官教学缓解大脑发育不同步带来的挫折感。' },
    219: { scene:'孩子问为什么有人不一样', advice:'祛除偏见，建立平等。说：“世界是由各种不一样的人组成的。他可能在某些方面需要辅助，就像你写作业需要台灯一样，这很正常。”', reason:'用中性的“差异”代替负面的“残缺”，培养包容心。' },
    220: { scene:'抗拒洗澡刷牙', advice:'提供“伪选项”。说：“你想先用草莓味还是薄荷味？你想在浴缸里玩小鸭子还是喷水枪？”', reason:'通过给予控制权来化解抵触，将任务转化为自主选择。' },

    301: { scene:'写作文困住', advice:'降低门槛，先求表达。说：“别把它当作文，就当是在朋友圈吐槽。你想怎么跟我讲这件事，就怎么写下来，废话也没关系。”', reason:'打破“完美主义”桎梏，让思维先于文笔流动。' },
    302: { scene:'说“讨厌数学”', advice:'同盟心态应对。说：“我也觉得有些题出得挺变态的。咱们不追求满分，先把你能看懂的部分搞定，剩下的我们找个有趣的解法。”', reason:'重塑学科情感，将“敌人”从数学转变为“待攻克的难题”。' },
    303: { scene:'翻看孩子手机日记', advice:'绝对尊重隐私。说：“我有我的空间，你也有你的。只要你不涉及安全红线，你的日记和手机永远是你的私密领地。”', reason:'信任是青春期最昂贵的资产，一旦破坏几乎不可逆。' },
    304: { scene:'放弃学多年的乐器', advice:'讨论动机，尊重终点。说：“坚持这么多年不容易。既然决定停下，是因为太累了还是彻底没兴趣了？我们可以换个不考级的方式玩音乐吗？”', reason:'保护自主选择权，防止“被迫坚持”毁掉对艺术的最后一点好感。' },
    305: { scene:'小团体被排挤', advice:'提升社交审美。说：“有些人聚在一起是为了找优越感。如果那个圈子让你压抑，说明那不是你的圈子。咱们去找让你舒服的人。”', reason:'教孩子识别高质量友谊，拒绝在卑微的社交中消耗自我。' },
    306: { scene:'担心自己胖', advice:'身体功能性引导。说：“身体是为你服务的，不是给别人看的。我们去尝试一种让你觉得有力量的运动，感受出汗的快乐，而不是盯着体重。”', reason:'对抗单一审美，建立基于健康和能力的自信。' },
    307: { scene:'送你不实用的礼物', advice:'看见情感逻辑。说：“虽然我现在暂时用不上，但你记得我喜欢这个颜色，这份心意让我觉得很被在乎。谢谢你！”', reason:'具体的反馈能精准强化孩子的爱与关怀行为。' },
    308: { scene:'考砸了哭', advice:'情绪急救先行。说：“想哭就大声哭。考砸了确实很逊，我也替你难过。但天没塌，等哭完了，我们去吃顿好的再收拾残局。”', reason:'接纳脆弱，让家成为可以失败的避风港而非第二考场。' },
    309: { scene:'在孩子面前抱怨伴侣', advice:'（同209）深刻反省并切割。明确告诉孩子：大人的事由大人解决，孩子不需要充当任何一方的倾听者。', reason:'避免情感勒索，维护家庭层级的健康。' },
    310: { scene:'忘记当天作业', advice:'提供工具支持而非指责。说：“老忘记说明大脑超负荷了。我们要不要试着弄个漂亮的便利贴或提醒软件？我帮你一起设置。”', reason:'用技术支架辅助功能发育，而非用道德评价打击自尊。' },
    311: { scene:'报太多班孩子抵触', advice:'承认家长的贪心。说：“是我之前太想让你全面发展了，忽略了你的感受。现在你决定删减掉两个最无感的，我们把精力留给最喜欢的。”', reason:'通过承认失误来归还选择权，重建学习的主人翁感。' },
    312: { scene:'网络社交焦虑', advice:'建立“数字边界”。提议说：“网络点赞不代表真实的你。每天晚上9点后，我们都把手机放回‘充电站’，过一会儿没屏幕的生活，如何？”', reason:'全家共同执行，降低孩子被孤立的焦虑感。' },
    313: { scene:'青春期发育害羞', advice:'去羞耻化沟通。说：“你最近长高了，身体也在悄悄变样，这是成熟的信号。这里有本书讲这些变化的，你可以看看，有问题随时问我。”', reason:'用知识消除未知带来的恐惧和羞耻感。' },
    314: { scene:'孩子说“你们只看成绩”', advice:'深度坦诚。说：“你说得对，我们最近确实被分数搞魔怔了，这是我们的焦虑，不该由你背。今晚不谈学习，只谈你想聊的。”', reason:'通过深刻反思修复裂痕，重新定义家长的角色。' },
    315: { scene:'聚会上讲孩子糗事', advice:'严守社交边界。除非孩子同意，否则闭嘴。事后道歉：“我刚才为了气氛说了你的私事，非常抱歉，我以后一定注意。”', reason:'尊重是亲子关系的根基，公共场合的维护胜过万语千言。' },
    316: { scene:'喂流浪猫', advice:'支持爱心，建立规则。说：“你有担当，我很骄傲。我们带上消毒纸巾和猫粮。不仅要给它们吃的，也要保护好自己不被抓伤。”', reason:'肯定善举的同时，植入责任感与自我保护意识。' },
    317: { scene:'不愿意为自己改变', advice:'示范成长心态。说：“我发现我最近脾气太臭了，我决定每天练习少发火一次。你监督我，我也试试看你的进步。”', reason:'通过家长的自我迭代，降低孩子对改变的防御心。' },
    318: { scene:'小题出错', advice:'游戏化博弈。说：“这道题像是在玩捉迷藏，故意藏了个坑。下次你当‘裁判’，看看能不能第一眼就识破这些出题人的伎俩。”', reason:'将枯燥的检查转化为智力挑战，缓解对错误的厌恶。' },
    319: { scene:'不运动宅家', advice:'降低启动门槛。说：“老待在屋里大脑快发霉了。走，去玩个飞盘，就30分钟。回来你继续宅着，我绝不打扰。”', reason:'用低压力的陪伴打破惯性，利用生理调节带动心理调节。' },
    320: { scene:'孩子透露不同性倾向', advice:'无条件接纳。说：“谢谢你这么信任我，告诉我这么重要的事。无论你喜欢谁，我永远是你的后盾，我爱你本身，而非标签。”', reason:'守护孩子的心理底线，确保他在世界面前有最稳固的支撑。' },

    401: { scene:'手机超过6小时', advice:'执行“协议制”。说：“我担心你的睡眠。我们定个规则：只要你能保证睡眠和运动，剩下的时间你自律。如果失控，我们再商量减速办法。”', reason:'从监控者转型为协商者，培养其对数字生活的管理能力。' },
    402: { scene:'说“活着没意思”', advice:'无条件的看见与陪伴。说：“听你这么说，我很难过，但我会一直陪着你。如果不舒服，我们去找专业的医生聊聊，好吗？”', reason:'正视自杀/抑郁信号，提供不带评判的情感撑托与专业路径。' },
    403: { scene:'摔东西提离婚', advice:'隔离冲突，明确归宿。说：“成人的矛盾处理得很糟糕，吓到你了。我们会处理好我们的关系，但对你的爱和责任绝对不会变。”', reason:'将成人冲突与亲子责任解耦，防止孩子产生幸存者偏差。' },
    404: { scene:'追求电竞等非传统路', advice:'用理性调研代替打压。说：“这个领域很酷但也极度残酷。我们要不要一起查一下它的淘汰率？如果你真想走，我们需要一个硬核的落地计划。”', reason:'支持探索，但要求其面对现实逻辑，培养理性决策力。' },
    405: { scene:'孩子锁门', advice:'承认“领地权”。敲门并说：“我理解你需要独处。我在外面放了你爱吃的水果，你想聊天的时候随时找我。”', reason:'尊重物理空间即是尊重其不断扩张的心理边界。' },
    406: { scene:'熬夜垃圾食品', advice:'伙伴式引导。说：“身体放纵久了大脑会变迟钝。这周末我们一起研究个好吃的健康菜单，给身体解解毒？”', reason:'避免唠叨式的指责，通过共同行动潜移默化影响生活习惯。' },
    407: { scene:'孩子兼职送礼', advice:'强化反哺价值。说：“这是你用劳动换来的礼物，对我来说意义非凡。我感受到了你的独立和对我的在乎，谢谢！”', reason:'具体的肯定能增强孩子的成年感和家庭参与度。' },
    408: { scene:'发现划伤痕迹', advice:'情感支撑先行。极其温柔地说：“我看到你手上的伤，我很难受。你一定承受了极大的痛苦。我能抱抱你吗？我会陪你一起度过这段难关。”', reason:'非惩罚性的危机干预是挽救心理危机的关键第一步。' },
    409: { scene:'说“全指望你了”', advice:'卸下代际枷锁。说：“你要过的是你自己的人生。我的幸福我自己负责，你只需要去探索你喜欢的世界，别背着我们跑。”', reason:'停止压力转移，让孩子轻装上阵去发展自我。' },
    410: { scene:'成绩大幅下滑', advice:'关系先于教育。说：“分数波动很正常，我更在意你最近过得好不好。是遇到什么烦心事了吗？只要你需要，我随时在这。”', reason:'稳定大于一切，只有安全的关系才能承载后续的学习修复。' },
    411: { scene:'偷看聊天记录', advice:'真诚道歉并承担后果。说：“我刚才因为过度焦虑做了错事，侵犯了你。我向你道歉，请给我机会重新建立信任。”', reason:'示范成年人如何面对并修正错误，通过示弱重建沟通渠道。' },
    412: { scene:'不喜欢孩子的密友', advice:'保持警示但尊重选择。说：“那个朋友性格挺强的，我担心你会受他影响。那是你的社交圈，你自己把握，但我会在这儿提醒你底线。”', reason:'提供侧面的观察视角，而非强行切割导致逆反。' },
    413: { scene:'对孩子的未来焦虑', advice:'共创愿景而非规划。说：“未来是不确定的，这很正常。我们来做个白日梦游戏，想象未来你最想要什么样的生活状态？”', reason:'通过激发想象力来缓解现实焦虑，将担忧转化为探索动力。' },
    414: { scene:'骂后冷战', advice:'家长先低头。主动说：“那天我情绪失控，说的话太毒了，我收回。我很爱你，但我还没学会怎么在生气时好好说话。我们能重新谈谈吗？”', reason:'用行动定义“修复力”，示范如何处理亲密关系中的裂痕。' },
    415: { scene:'晚餐各自看手机', advice:'重建交流仪式。提议说：“今天晚餐我们玩个‘手机收纳游戏’。谁先碰手机谁洗碗，我们来聊聊这周最离谱的新闻？”', reason:'用趣味规则代替强制禁令，重建家庭成员间的联结感。' },

  // ====================== 全局状态 ======================
  let selectedAge = null;
  let currentQuestions = [];
  let currentIndex = 0;
  let answers = [];
  let lastDimScores = null;
  let lastChildTotal = 0;
  let lastTypeIndex = 0;

  const ageScreen = document.getElementById('ageScreen');
  const quizScreen = document.getElementById('quizScreen');
  const resultScreen = document.getElementById('resultScreen');
  const questionText = document.getElementById('questionText');
  const optionsContainer = document.getElementById('optionsContainer');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const stepText = document.getElementById('stepText');
  const progressFill = document.getElementById('progressFill');
  const resultContent = document.getElementById('resultContent');

  function selectAge(age) {
    selectedAge = age;
    const pool = (questionBank[age] || []).concat(questionBank['common'] || []).sort(() => Math.random() - 0.5);
    currentQuestions = pool.slice(0, 30);
    answers = new Array(currentQuestions.length).fill(null);
    currentIndex = 0;
    ageScreen.classList.add('hidden');
    quizScreen.classList.remove('hidden');
    resultScreen.style.display = 'none';
    renderQuestion();
  }

  function renderQuestion() {
    if (!currentQuestions.length) return;
    const q = currentQuestions[currentIndex];
    questionText.textContent = q.text;
    optionsContainer.innerHTML = '';
    q.opts.forEach((opt, idx) => {
      const div = document.createElement('div');
      div.className = 'option-item';
      if (answers[currentIndex] === idx) div.classList.add('selected');
      div.innerHTML = `<div class="radio-custom"></div>${opt.t}`;
      div.addEventListener('click', () => {
        answers[currentIndex] = idx;
        optionsContainer.querySelectorAll('.option-item').forEach((it, i) => it.classList.toggle('selected', i === idx));
      });
      optionsContainer.appendChild(div);
    });
    stepText.textContent = `第 ${currentIndex + 1} / ${currentQuestions.length} 题`;
    progressFill.style.width = ((currentIndex + 1) / currentQuestions.length * 100) + '%';
    prevBtn.disabled = currentIndex === 0;
    nextBtn.textContent = currentIndex === currentQuestions.length - 1 ? '查看结果 ✨' : '下一题 →';
  }

  prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } });
  nextBtn.addEventListener('click', () => {
    const selectedDiv = optionsContainer.querySelector('.option-item.selected');
    if (!selectedDiv) { alert('请选择一个选项'); return; }
    answers[currentIndex] = Array.from(optionsContainer.querySelectorAll('.option-item')).indexOf(selectedDiv);
    if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderQuestion(); } else { showResult(); }
  });

        desc:'孩子在新环境和社交场合中退缩、被动，需要较长时间预热。您可能为他的社交感到孤立无援，担心他被冷落。',
        advice:'提前预告新环境，允许旁观，从一对一玩伴开始练习。您的接纳是他迈向外部世界的第一座桥梁。慢慢来，比较快。' },
      { main:'自主对抗型', sub:'🦊 孩子总跟你对着干，你已筋疲力尽', color:'#16a34a',
        desc:'孩子自我意识强烈，频繁挑战规则与指令，您感觉每天都在进行权力斗争。这其实是健康自主性的萌芽，只是目前让您消耗巨大。',
        advice:'给予有限选择，减少命令，让孩子在可控范围内做主。坚守底线时温和解释原因。您的疲惫需要被看到，也值得休息。' },
      { main:'家庭浸染型', sub:'🏠 孩子其实还好，但家里氛围需要改善', color:'#ea580c',
        desc:'孩子本身的困难并不突出，但家庭成员间的沟通摩擦、教育不一致或高压氛围正在影响亲子关系。您承担的很多压力，其实源自环境而非孩子。',
        advice:'优先调整家庭沟通模式，设立“无批评日”，尝试家庭会议。照顾好自己和伴侣的情绪，温暖的家是给孩子最好的支持。' },
      { main:'互相伤害型', sub:'💔 你和孩子陷入了互相伤害的循环', color:'#ea580c',
        desc:'亲子互动进入了负面循环：越批评孩子越逆反，越逆反您越愤怒。双方都感到受伤，但谁也无法先停下来。',
        advice:'请主动按下暂停键，修复联结比纠正行为更重要。每天留出10分钟“特殊时光”，完全由孩子主导。求助心理咨询或亲子课程是非常值得的。' },
      { main:'危机警示型', sub:'🆘 你和孩子都面临巨大挑战，需要专业援手', color:'#b91c1c',
        desc:'孩子在多个发展领域出现明显困难，情绪或行为问题已经显著影响到日常生活和亲子关系。您也承受着巨大的心理压力，可能感到无力与绝望。',
        advice:'请尽快联系儿童发展专家或心理老师进行一次全面评估。这不是任何人的错，而是及时为成长护航。您已经迈出了最重要的一步——正视问题。' }
    ];
    return types[idx];
  }

  function showResult() {
    let dimScores = { focus:0, emotion:0, social:0, development:0, positive:0, family:0, parenting:0 };
    currentQuestions.forEach((q, idx) => {
      const score = q.opts[answers[idx]].s;
      if (dimScores.hasOwnProperty(q.dim)) dimScores[q.dim] += score;
    });
    lastDimScores = dimScores;
    const childTotal = dimScores.focus + dimScores.emotion + dimScores.social + dimScores.development + dimScores.positive;
    const envTotal = dimScores.family + dimScores.parenting;
    lastChildTotal = childTotal;
    let typeIdx;
    if (dimScores.development >= 8 && (dimScores.emotion >= 10 || dimScores.social >= 7) && childTotal >= 35) typeIdx = 7;
    else if (envTotal >= 12 && childTotal < 28) typeIdx = 5;
    else if (childTotal >= 28 || envTotal >= 10) typeIdx = 6;
    else {
      if (dimScores.focus <= 4 && dimScores.emotion <= 4 && dimScores.positive <= 3 && envTotal <= 6) typeIdx = 0;
      else if (dimScores.emotion >= 6 && dimScores.focus <= 4 && dimScores.positive <= 4) typeIdx = 1;
      else if (dimScores.focus >= 6 && dimScores.emotion <= 4) typeIdx = 2;
      else if (dimScores.social >= 5 && dimScores.emotion <= 4) typeIdx = 3;
      else if (dimScores.positive <= 2 && envTotal <= 5) typeIdx = 4;
      else typeIdx = 0;
    }
    lastTypeIndex = typeIdx;
    const type = getTypeInfo(typeIdx);
    resultContent.innerHTML = `
      <div class="type-badge" style="color:${type.color}">${type.main}</div>
      <div class="type-sub">${type.sub}</div>
      <div class="type-desc">${type.desc}</div>
      <div class="advice-box"><strong>💬 改善方向</strong><br>${type.advice}</div>
      <div class="pay-teaser">
        <h3 style="color:#1e3a8a;">📘 解锁完整教育指南</h3>
        <p style="margin:12px 0;">包含深度<strong>孩子画像、家长画像、雷达图分析</strong>，以及为您量身定制的<strong>行动方案、心法清单和分阶段目标</strong>。</p>
        <button class="btn btn-primary" id="unlockGuideBtn">查看完整报告 →</button>
      </div>
    `;
    quizScreen.classList.add('hidden');
    resultScreen.style.display = 'block';
    document.getElementById('unlockGuideBtn').addEventListener('click', () => {
      generateGuide(lastDimScores, selectedAge, lastChildTotal, lastTypeIndex, currentQuestions, answers);
    });
  }

  function drawRadar(ctx, labels, scores, maxVals) {
    if (!ctx) return;
    const centerX = 150, centerY = 150, radius = 120;
    const total = labels.length;
    const angleSlice = (2 * Math.PI) / total;
    for (let level = 1; level <= 5; level++) {
      const r = (level / 5) * radius;
      ctx.beginPath();
      for (let i = 0; i < total; i++) {
        const angle = angleSlice * i - Math.PI / 2;
        const x = centerX + r * Math.cos(angle), y = centerY + r * Math.sin(angle);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.strokeStyle = '#e0e4ed'; ctx.stroke();
    }
    for (let i = 0; i < total; i++) {
      const angle = angleSlice * i - Math.PI / 2;
      ctx.beginPath(); ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + radius * Math.cos(angle), centerY + radius * Math.sin(angle));
      ctx.strokeStyle = '#e0e4ed'; ctx.stroke();
      ctx.fillStyle = '#2e3a52'; ctx.font = '12px "PingFang SC"'; ctx.textAlign = 'center';
      ctx.fillText(labels[i], centerX + (radius + 18) * Math.cos(angle), centerY + (radius + 18) * Math.sin(angle) + 4);
    }
    ctx.beginPath();
    for (let i = 0; i < total; i++) {
      const ratio = Math.min(scores[i] / maxVals[i], 1);
      const angle = angleSlice * i - Math.PI / 2;
      const x = centerX + radius * ratio * Math.cos(angle), y = centerY + radius * ratio * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fillStyle = 'rgba(30, 58, 138, 0.15)'; ctx.fill();
    ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2; ctx.stroke();
  }

  function generateGuide(dimScores, age, childTotal, typeIdx, questions, userAnswers) {
    const oldModal = document.getElementById('guideModal');
    if (oldModal) oldModal.remove();
    const modal = document.createElement('div');
    modal.className = 'guide-modal'; modal.id = 'guideModal';

    let childPortrait = childTotal <= 15 ? '他/她是一位发展均衡、状态良好的孩子。' : childTotal <= 28 ? '他/她是一位在某些领域稍显辛苦的孩子，但仍有闪光点。' : childTotal <= 40 ? '他/她是一位在多个方面正面临挑战的孩子，需要理解与支持。' : '他/她是一位正在经历巨大发展困难的孩子，需要被看见和专业帮助。';
    let parentPortrait = dimScores.parenting >= 8 ? '你是一位承受很大情绪压力的家长，常因控制不住脾气而后悔。' : dimScores.parenting >= 4 ? '你是一位尽力平衡的家长，偶尔失控但值得被看见。' : '你是一位觉察力很强的家长。';
    if (dimScores.family >= 8) parentPortrait += '家庭环境存在摩擦。';
    else if (dimScores.family >= 4) parentPortrait += '家庭氛围尚可。';
    else parentPortrait += '家庭氛围和睦。';

    const childRadarId = 'childRadar_' + Date.now();
    const parentRadarId = 'parentRadar_' + Date.now();
    setTimeout(() => {
      const childCanvas = document.getElementById(childRadarId);
      if (childCanvas) drawRadar(childCanvas.getContext('2d'), ['注意力','情绪','社交','发育','积极品质','家庭','家长行为'], [dimScores.focus, dimScores.emotion, dimScores.social, dimScores.development, dimScores.positive, dimScores.family, dimScores.parenting], [12,12,9,9,9,15,15]);
      const parentCanvas = document.getElementById(parentRadarId);
      if (parentCanvas) {
        let lS=0,lC=0,eS=0,eC=0,cS=0,cC=0,sS=0,sC=0;
        questions.forEach((q,i)=>{
          const a = userAnswers[i]; if(a===null||a===undefined)return;
          const rev=3-q.opts[a].s;
          if(q.id===507||q.id===215){lS+=rev;lC++;}
          if(q.id===510||q.id===217){eS+=rev;eC++;}
          if(q.id===204||q.id===211){cS+=rev;cC++;}
          if(q.id===501||q.id===317){sS+=rev;sC++;}
        });
        drawRadar(parentCanvas.getContext('2d'), ['倾听','情绪调节','比较控制','家庭和谐','自我关怀'], [lC?lS/lC:2,eC?eS/eC:2,cC?cS/cC:2,Math.max(0,5-dimScores.family/3),sC?sS/sC:2], [3,3,3,5,3]);
      }
    }, 200);

    // ---- 筛选心法 ----
    const wisdomIds = [];
    questions.forEach((q, idx) => {
      const ansIdx = userAnswers[idx];
      if (ansIdx !== null && ansIdx !== undefined && q.opts[ansIdx].s >= 2) {
        if (wisdomMap[q.id]) wisdomIds.push(q.id);
      }
    });
    const uniqueWisdoms = [...new Set(wisdomIds)];
    let wisdomHtml = '';
    if (uniqueWisdoms.length > 0) {
      wisdomHtml = uniqueWisdoms.map(id => {
        const w = wisdomMap[id];
        return `<li><strong>${w.scene}</strong><br>💡 应对：${w.advice}<br><em style="font-size:13px; color:#5f6c84;">原理：${w.reason}</em></li>`;
      }).join('');
    } else {
      wisdomHtml = '<li>您目前没有出现明显需关注的情景，继续保持！</li>';
    }

    // ---- 行动方案 ----
    const plan = actionPlanMap[age]?.[typeIdx] || actionPlanMap['3-5'][0];
    const actionsHtml = plan.map(a => `<li>${a}</li>`).join('');

    // ---- 分阶段目标 ----
    const stages = [
      { t:'关系修复', time:'1-2周', g:'停止负面互动', a:['每天10分钟特殊时光','暂停惩罚威胁','睡前一句肯定'] },
      { t:'核心奠基', time:'3-4周', g:dimScores.emotion>=7?'情绪觉察':(dimScores.focus>=7?'专注习惯':'家庭沟通'), a:dimScores.emotion>=7?['情绪卡片','共读绘本']:['番茄钟','成功罐'] },
      { t:'能力提升', time:'5-8周', g:'培养自主', a:['自主安排作业','家庭小任务'] },
      { t:'巩固成长', time:'9-12周', g:'内化习惯', a:['庆祝进步','家长恢复个人时间'] }
    ];
    const stageHtml = stages.map(s => `<tr><td><strong>${s.t}</strong><br>${s.time}</td><td>${s.g}</td><td>${s.a.join('<br>')}</td></tr>`).join('');

    // ---- 推荐书单 ----
    let books = '';
    if (age === '3-5') {
      books = '<li>《我的感觉》系列绘本</li><li>《游戏力》</li><li>《正面管教》</li>';
    } else if (age === '6-8') {
      books = '<li>《如何说孩子才会听》</li><li>《分心不是我的错》</li><li>《陪孩子走过小学六年》</li>';
    } else if (age === '9-12') {
      books = '<li>《解码青春期》</li><li>《为什么我的青春期孩子不和我说话》</li><li>《自驱型成长》</li>';
    } else {
      books = '<li>《为青少年立界线》</li><li>《青春期情绪密码》</li><li>《高成就孩子的教养法则》</li>';
    }
    if (dimScores.emotion >= 7) books += '<li>《培养高情商的孩子》</li>';
    if (dimScores.focus >= 7) books += '<li>《聪明却混乱的孩子》</li>';

    // ---- 推荐纪录片 ----
    let docs = '';
    if (age === '3-5') {
      docs = '<li>《婴儿的秘密生活》</li><li>《他乡的童年》</li>';
    } else if (age === '6-8') {
      docs = '<li>《我不是笨小孩》</li><li>《生命·成长》</li>';
    } else if (age === '9-12') {
      docs = '<li>《他乡的童年》</li><li>《我们如何对抗抑郁》</li>';
    } else {
      docs = '<li>《人生七年》</li><li>《大学·城》</li>';
    }
    if (dimScores.emotion >= 7 || dimScores.parenting >= 8) docs += '<li>《压力的真相》</li>';

    modal.innerHTML = `
      <div class="guide-content">
        <button class="close-guide" onclick="this.parentElement.parentElement.remove()">✕</button>
        <h2 style="color:#1e3a8a; text-align:center; margin-bottom:20px;">📘 亲子教育画像完整报告</h2>
        <div class="guide-section"><h3>👶 孩子画像</h3><p>“${childPortrait}”</p><div class="radar-container"><canvas id="${childRadarId}" width="300" height="300"></canvas></div></div>
        <div class="guide-section"><h3>🧑 家长画像</h3><p>“${parentPortrait}”</p><div class="radar-container"><canvas id="${parentRadarId}" width="300" height="300"></canvas></div></div>
        <div class="guide-section"><h3>🧘 你的专属心法（基于答题弱点）</h3><ol style="padding-left:20px; line-height:1.8;">${wisdomHtml}</ol></div>
        <div class="guide-section"><h3>🎯 专属行动方案</h3><ul style="padding-left:20px;">${actionsHtml}</ul></div>
        <div class="guide-section"><h3>📅 分阶段执行目标</h3><table class="time-table"><tbody>${stageHtml}</tbody></table></div>
        <div class="guide-section"><h3>📚 推荐书单</h3><ul>${books}</ul></div>
        <div class="guide-section"><h3>🎬 推荐纪录片</h3><ul>${docs}</ul></div>
        <p style="text-align:center; margin-top:20px; font-size:13px; color:#8b99af;">报告基于测评生成，请灵活调整。</p>
      </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  }

  document.querySelectorAll('#ageScreen .option-item').forEach(el => {
    el.addEventListener('click', function() { selectAge(this.dataset.age); });
  });
</script>
